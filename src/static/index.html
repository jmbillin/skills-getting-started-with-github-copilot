<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="lookup-container">
        <h3>Look Up Activity by ID</h3>
        <form id="lookup-form">
          <div class="form-group">
            <label for="activity-id">Activity ID:</label>
            <input type="number" id="activity-id" required placeholder="Enter activity ID (e.g. 1)" min="1" />
          </div>
          <button type="submit">Look Up</button>
        </form>
        <div id="lookup-result" class="hidden">
          <h4 id="lookup-name"></h4>
          <p><strong>Description:</strong> <span id="lookup-description"></span></p>
          <p><strong>Version Filed:</strong> <span id="lookup-version-filed"></span></p>
        </div>
        <div id="lookup-message" class="hidden"></div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
